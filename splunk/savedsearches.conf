# AgentGate correlation rules (SPEC §6).
#
# Deploy: python scripts/deploy_splunk.py   (pushes via REST, no restart needed)
# Manual alternative: copy to $SPLUNK_HOME/etc/apps/search/local/savedsearches.conf
# and reload (Settings -> Searches, reports, and alerts).
#
# Field-name note: HEC events index the decision JSON under params.*, and Splunk
# search-time extraction duplicates JSON fields into multivalues on this instance —
# every rule mvdedup()s before stats. Do not "simplify" the evals away.

[AgentGate R1 - Scope Violation by Agent]
description = Zero-trust scope violations: which agent tried to reach which service it was never granted. Fires on any DENY with reason=scope_violation in the window.
search = index=agentgate "params.decision"=DENY "params.reason"=scope_violation | eval agent_id=mvdedup('params.agent_id'), target_service=mvdedup('params.target_service'), token_scope=mvjoin(mvdedup('params.token_scope{}'), ", ") | stats count AS violations, latest(_time) AS last_attempt, latest(token_scope) AS token_scope BY agent_id, target_service | convert ctime(last_attempt)
dispatch.earliest_time = -15m@m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert.severity = 4
alert.track = 1
alert.suppress = 0
is_visible = 1

[AgentGate R2 - Sensitive Service Denied (secrets-store)]
description = DEMO ALERT. An agent was refused at the network layer while targeting the secrets store. High severity: this is the prompt-injection / credential-exfiltration signature. Runs every minute.
search = index=agentgate "params.decision"=DENY "params.target_service"=secrets-store | eval agent_id=mvdedup('params.agent_id'), reason=mvdedup('params.reason'), token_scope=mvjoin(mvdedup('params.token_scope{}'), ", "), action=mvdedup('params.action') | table _time, agent_id, action, reason, token_scope
dispatch.earliest_time = -2m@m
dispatch.latest_time = now
cron_schedule = * * * * *
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert.severity = 5
alert.track = 1
alert.suppress = 0
is_visible = 1

[AgentGate R3 - High Denial Rate Anomaly]
description = Burst behavior: more than 5 denials for one agent within a single minute suggests automated probing or a runaway compromised agent.
search = index=agentgate "params.decision"=DENY | eval agent_id=mvdedup('params.agent_id') | bin _time span=1m | stats count BY agent_id, _time | where count > 5
dispatch.earliest_time = -15m@m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert.severity = 4
alert.track = 1
alert.suppress = 0
is_visible = 1
