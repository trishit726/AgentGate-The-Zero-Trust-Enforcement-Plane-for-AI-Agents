# AgentGate indexes — deploy to $SPLUNK_HOME/etc/apps/search/local/indexes.conf
# (or create both via Splunk Web: Settings -> Indexes -> New Index)
#
# The HEC token used by the broker must list BOTH indexes in its allowed indexes.

[agentgate]
homePath   = $SPLUNK_DB/agentgate/db
coldPath   = $SPLUNK_DB/agentgate/colddb
thawedPath = $SPLUNK_DB/agentgate/thaweddb

[agentgate_investigations]
homePath   = $SPLUNK_DB/agentgate_investigations/db
coldPath   = $SPLUNK_DB/agentgate_investigations/colddb
thawedPath = $SPLUNK_DB/agentgate_investigations/thaweddb
